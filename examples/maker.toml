# StandX maker strategy example
#
# Copy to ~/.config/standx/maker.toml, or pass with:
#   standx maker run BTC-USD --maker-config ./examples/maker.toml
#
# This file deliberately contains no JWT, private key, --live switch, or
# webhook URL. Those remain explicit command-line/environment choices.

# Quote geometry
spread_bps = 8.0
band_bps = 30.0
size = 0.001
levels = 2
level_step_bps = 2.0
refresh_bps = 4.0
interval = 5

# Inventory and safety guards
max_position = 0.01
skew_bps = 6.0
max_divergence_bps = 25.0
vol_pause_bps = 40.0
vol_window = 12

# Financial brake: when session mark-to-market PnL drops to -stop_loss (quote
# units), the bot runs the fail-safe shutdown (freeze, cancel the maker book,
# await the critical webhook, exit). 0 disables.
stop_loss = 0.0

# Alerts and optional active inventory exit (0 disables)
alert_loss = 50.0
alert_inventory_pct = 80.0
alert_uptime = 70.0
# Account floors (live-only; need an account snapshot). Fire once when the
# metric drops below the floor and clear once it recovers 10% above it.
alert_equity_below = 0.0
alert_margin_below = 0.0
inventory_exit_pct = 0.0
inventory_exit_qty = 0.0

# Order-response recovery: each attempt cancels/verifies maker orders, opens a
# new authenticated session, then reconciles orders, position, and fills.
# Set attempts to 0 to retain immediate fail-safe shutdown on disconnect.
order_response_reconnect_attempts = 3
order_response_reconnect_backoff = 2

# Account-stream recovery: each attempt reconnects the authenticated account
# stream, replays buffered events, and backs any gap with REST trades before
# reconciling the venue position. Set attempts to 0 to retain immediate
# fail-safe shutdown on disconnect.
account_stream_reconnect_attempts = 3
account_stream_reconnect_backoff = 2

# Shared rolling circuit breaker across account-stream and order-response
# recovery incidents. Attempt counts above reset for every admitted incident.
recovery_incidents_per_window = 3
recovery_window_secs = 3600

# Use REST market polling instead of the WebSocket feed (normally false)
no_ws = false
